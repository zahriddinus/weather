<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/main.css" />

    <title>Weather</title>
  </head>
  <body>
    <div class="main">
      <div class="container p-2 p-sm-3 text-bg-light">
        <h1 class="main__title text-center">Weather</h1>

        <div class="">
          <div
            class="search mb-3 d-flex flex-column flex-sm-row justify-content-sm-between gap-1"
          >
            <div class="d-flex align-items-center gap-1 gap-lg-2">
              <span
                class="search__round d-inline-block rounded-circle bg-primary"
              ></span>
              <h3 class="search__address m-0 mb-1 mb-sm-0 d-inline-block">
                Tashkent / Uzbekistan
              </h3>
            </div>

            <form class="search__form d-flex align-items-center gap-2">
              <div class="search__input-wrapper">
                <input
                  class="search__form-input form-control"
                  type="text"
                  name="city"
                  placeholder="Search for a city..."
                  required
                  autocomplete="off"
                />

                <ul
                  class="search__suggestions-list d-none overflow-x-auto z-1"
                ></ul>
              </div>

              <button
                class="search__btn btn btn-primary fw-semibold"
                type="submit"
              >
                Search
              </button>
            </form>
          </div>

          <!-- Condition -->

          <div
            class="conditions text-start d-flex flex-column flex-sm-row align-items-center"
          >
            <div class="conditions__left me-2 mb-2 d-flex">
              <span class="conditions__left-icon me-2">☀️</span>
              <span class="conditions__left-temperature me-2 fw-semibold"
                >0</span
              >
              <span class="fs-5 fw-medium lh-base">℃</span>
            </div>

            <span
              class="conditions__line bg-secondary d-none d-sm-block"
            ></span>

            <div
              class="conditions__details d-flex align-items-center justify-content-between w-100"
            >
              <ul class="conditions__right m-0 p-0 ms-2 list-unstyled">
                <li class="conditions__right-details fw-normal">
                  Chance of Precipitation:
                  <span class="conditions__right-chance-of-prec">0%</span>
                </li>
                <li class="conditions__right-details fw-normal">
                  Humidity: <span class="conditions__right-humidity">0%</span>
                </li>
                <li class="conditions__right-details fw-normal">
                  Wind: <span class="conditions__right-wind">0 km/h</span>
                </li>
              </ul>

              <ul class="conditions__datas m-0 p-0 list-unstyled text-end">
                <li class="conditions__datas-items fw-semibold">Weather</li>
                <li class="conditions__datas-items fw-normal">
                  <span class="conditions__datas-day">Monday</span>
                  <span class="conditions__datas-day-time">0:00 PM</span>
                </li>
                <li class="conditions__datas-items fw-normal">
                  <span class="conditions__datas-items-condition">Clear</span>
                </li>
              </ul>
            </div>
          </div>
        </div>

        <div class="chart-wrapper">
          <div
            id="chart"
            class="w-100 pt-sm-2 pt-md-4 pt-lg-5"
            style="height: auto"
          ></div>
        </div>
      </div>
    </div>

    <!-- Grapic of weather -->

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
